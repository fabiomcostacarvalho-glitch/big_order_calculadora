<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Logística - Otimizada</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --success: #27ae60; 
            --danger: #e74c3c; 
            --warning: #f39c12;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 6px; border: 1px solid #eee; background: #fafafa; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
        
        .status-approve { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-reject { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-lead { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador de Ajuda (v2.0)</h2>

    <div class="form-group">
        <label>Veículo dos Estafetas:</label>
        <select id="vehicle" onchange="calculate()">
            <option value="A PÉ">A Pé (Limite 4kg)</option>
            <option value="BICICLETA">Bicicleta (Limite 9kg)</option>
            <option value="MOTOCICLETA">Motocicleta (Limite 12kg)</option>
            <option value="CAR">Carro (Limite 15kg)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Peso Total (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ex: 16" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>Nº de Sacos:</label>
        <input type="number" id="bags" placeholder="Ex: 6" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>Estafetas JÁ no pedido:</label>
        <input type="number" id="currentCouriers" value="1" oninput="calculate()">
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="bigItems" onchange="calculate()">
        <label style="margin:0">Itens de Grandes Dimensões?</label>
    </div>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        const vehicle = document.getElementById('vehicle').value;
        const weight = parseFloat(document.getElementById('weight').value) || 0;
        const bags = parseInt(document.getElementById('bags').value) || 0;
        const couriers = parseInt(document.getElementById('currentCouriers').value) || 1;
        const hasBigItems = document.getElementById('bigItems').checked;
        const resultDiv = document.getElementById('result');

        resultDiv.style.display = "block";

        // --- REGRA 1: FILTRO DE SACOS ---
        if (bags <= 2) {
            showResult("❌ REJEITAR AJUDA<br><small>Apenas 2 sacos ou menos.</small>", "status-reject");
            return;
        }

        // --- REGRA 2: CAPACIDADE TÉCNICA ---
        let limitPerV = 0;
        if (vehicle === "A PÉ") limitPerV = 4;
        else if (vehicle === "BICICLETA") limitPerV = 9;
        else if (vehicle === "MOTOCICLETA") limitPerV = 12;
        else if (vehicle === "CAR") limitPerV = 15;

        let currentCapacity = limitPerV * couriers;

        // --- REGRA 3: LÓGICA DE DECISÃO ---

        // Se o que já temos de estafetas AGUENTA o peso
        if (weight <= currentCapacity) {
            // Caso especial: se o peso está ok mas tem item gigante
            if (hasBigItems) {
                showResult("⚠️ CONSULTAR LEAD<br><small>Peso OK para "+couriers+" estafeta(s), mas há itens grandes.</small>", "status-lead");
            } else {
                showResult("❌ REJEITAR AJUDA<br><small>Capacidade atual ("+currentCapacity+"kg) é suficiente para "+weight+"kg.</small>", "status-reject");
            }
        } 
        else {
            // Se o peso EXCEDER a capacidade atual, verificamos se vale a pena adicionar
            // Mas limitamos: se já temos 2 ou mais, e o rácio de sacos for baixo, não faz sentido 3º ou 4º
            if (couriers >= 2 && (bags / (couriers + 1)) < 2) {
                showResult("❌ REJEITAR AJUDA<br><small>Limite de estafetas atingido para este volume de sacos.</small>", "status-reject");
            } else {
                showResult("✅ ADICIONAR +1 ESTAFETA<br><small>Peso atual excede o limite dos estafetas em curso.</small>", "status-approve");
            }
        }
    }

    function showResult(text, className) {
        const div = document.getElementById('result');
        div.innerHTML = text;
        div.className = className;
    }
</script>

</body>
</html>
