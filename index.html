<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Reembolsos - Fluxo Decisório</title>
    <style>
        :root {
            --primary: #2c3e50;
            --danger: #e74c3c;
            --success: #27ae60;
            --neutral: #95a5a6;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
        }

        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%; 
        }

        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; color: var(--primary); font-size: 20px; text-align: center; }

        .step {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid var(--neutral);
            background: #f8f9fa;
        }

        .step-critical { border-left-color: var(--danger); background: #fff5f5; }
        .step-score { border-left-color: #3498db; background: #f0f7ff; }

        .label-text { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #333; }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        .rule-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }

        .rule-row:last-child { border-bottom: none; }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .status-ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-no { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .hidden { display: none; }
        .badge { background: #3498db; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador de Red Flag</h2>
    
    <div class="step step-critical">
        <label class="label-text">1. O cliente forneceu Prova Objetiva?</label>
        <select id="evidence" onchange="validateFlow()">
            <option value="">-- Selecionar --</option>
            <option value="yes">Sim</option>
            <option value="no">Não</option>
        </select>
    </div>

    <div id="stepRefunds" class="step step-critical hidden">
        <label class="label-text">2. Histórico de Refunds (Últimos 30 dias):</label>
        <select id="refunds" onchange="validateFlow()">
            <option value="">-- Selecionar --</option>
            <option value="low">2 ou menos Refunds</option>
            <option value="high">3 ou mais Refunds</option>
        </select>
    </div>

    <div id="stepScore" class="step step-score hidden">
        <span class="label-text">Validação de Perfil (Mínimo 4 de 5):</span>
        
        <div class="rule-row"><span>Cliente Recorrente (2+ ordens)</span> <input type="checkbox" class="check" onchange="validateFlow()"></div>
        <div class="rule-row"><span>Conta Prime Ativa (Enabled)</span> <input type="checkbox" class="check" onchange="validateFlow()"></div>
        <div class="rule-row"><span>Sem Dívidas Pendentes</span> <input type="checkbox" class="check" onchange="validateFlow()"></div>
        <div class="rule-row"><span>Volume Alto (15+ ordens / 6 meses)</span> <input type="checkbox" class="check" onchange="validateFlow()"></div>
        <div class="rule-row"><span>Telefone Local (PT)</span> <input type="checkbox" class="check" onchange="validateFlow()"></div>
        
        <div style="margin-top: 10px; text-align: right; font-size: 13px;">
            Pontuação: <span id="scoreText" class="badge">0</span> / 5
        </div>
    </div>

    <div id="result"></div>
</div>

<script>
    function validateFlow() {
        const evidence = document.getElementById('evidence').value;
        const refunds = document.getElementById('refunds').value;
        const stepRefunds = document.getElementById('stepRefunds');
        const stepScore = document.getElementById('stepScore');
        const result = document.getElementById('result');

        // Reset inicial
        result.style.display = "none";
        stepRefunds.classList.add('hidden');
        stepScore.classList.add('hidden');

        // 1. Validar Evidência
        if (evidence === "no") {
            showResult("❌ NEGADO: Falta de evidência objetiva.", "status-no");
            return;
        } else if (evidence === "yes") {
            stepRefunds.classList.remove('hidden');
        } else { return; }

        // 2. Validar Refunds
        if (refunds === "high") {
            showResult("❌ NEGADO: 3 ou mais refunds em 30 dias.", "status-no");
            return;
        } else if (refunds === "low") {
            stepScore.classList.remove('hidden');
        } else { return; }

        // 3. Validar Pontuação (4 em 5)
        const checks = document.querySelectorAll('.check');
        let score = 0;
        checks.forEach(c => { if(c.checked) score++; });
        document.getElementById('scoreText').innerText = score;

        if (score >= 4) {
            showResult("✅ APROVADO: Critérios 4/5 atingidos.", "status-ok");
        } else {
            showResult("❌ NEGADO: Pontuação insuficiente (" + score + "/5).", "status-no");
        }
    }

    function showResult(text, css) {
        const result = document.getElementById('result');
        result.innerHTML = text;
        result.className = css;
        result.style.display = "block";
    }
</script>

</body>
</html>
