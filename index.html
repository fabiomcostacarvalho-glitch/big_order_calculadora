<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Logística Pro</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .info-table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; background: #fdfdfd; }
        .info-table th, .info-table td { border: 1px solid #eee; padding: 8px; text-align: center; }
        .info-table th { background: #f8f9fa; color: #666; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; }
        .status-approve { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-reject { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-lead { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .highlight { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador Logístico</h2>

    <div class="form-group">
        <label>Veículo do 1º Estafeta:</label>
        <select id="vehicle" onchange="calculate()">
            <option value="4">A Pé (4kg)</option>
            <option value="9">Bicicleta (9kg)</option>
            <option value="12">Motocicleta (12kg)</option>
            <option value="15">Carro (15kg)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Peso Total (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ex: 20" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>Total de Sacos:</label>
        <input type="number" id="bags" placeholder="Ex: 6" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>Estafetas JÁ no pedido:</label>
        <input type="number" id="currentCouriers" value="1" oninput="calculate()">
    </div>
