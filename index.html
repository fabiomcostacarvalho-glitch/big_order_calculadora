<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Logística - Unidade Moto</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --success: #27ae60; 
            --danger: #e74c3c; 
            --warning: #f39c12;
            --info: #3498db;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
        h2 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 6px; border: 1px solid #eee; background: #fafafa; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
        
        .status-approve { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-reject { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-lead { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="container">
    <h2>Validador de Reforço (Base: Moto)</h2>

    <div class="form-group">
        <label>Veículo do 1º Estafeta:</label>
        <select id="vehicle" onchange="calculate()">
            <option value="4">A Pé (4kg)</option>
            <option value="9">Bicicleta (9kg)</option>
            <option value="12">Motocicleta (12kg)</option>
            <option value="15">Carro (15kg)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Peso Total do Pedido (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ex: 25" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>Total de Sacos:</label>
        <input type="number" id="bags" placeholder="Ex: 8" oninput="calculate()">
    </div>

    <div class="form-group">
        <label>Quantos estafetas estão lá agora?</label>
        <input type="number" id="currentCouriers" value="1" oninput="calculate()">
    </div>

    <div class="form-group checkbox-group">
        <input type="checkbox" id="bigItems" onchange="calculate()">
        <label style="margin:0">Itens de Grandes Dimensões?</label>
    </div>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        const firstVehicleLimit = parseFloat(document.getElementById('vehicle').value);
        const weight = parseFloat(document.getElementById('weight').value) || 0;
        const bags = parseInt(document.getElementById('bags').value) || 0;
        const currentCouriers = parseInt(document.getElementById('currentCouriers').value) || 1;
        const hasBigItems = document.getElementById('bigItems').checked;
        const resultDiv = document.getElementById('result');

        const MOTO_LIMIT = 12; // Unidade padrão de reforço
        resultDiv.style.display = "block";

        // 1. REGRA ELIMINATÓRIA: Sacos
        if (bags <= 2) {
            showResult("❌ REJEITAR AJUDA<br><small>Volume de sacos (2 ou menos) não permite divisão.</small>", "status-reject");
            return;
        }

        // 2. CÁLCULO DE CAPACIDADE ATUAL
        // O primeiro tem o limite do veículo dele, os subsequentes assumimos que são motos (12kg)
        let capacityOfCurrentTeam = firstVehicleLimit + ((currentCouriers - 1) * MOTO_LIMIT);

        // 3. LÓGICA DE DECISÃO
        if (weight <= capacityOfCurrentTeam) {
            // Se o peso cabe nos que já estão lá
            if (hasBigItems) {
                showResult("⚠️ CONSULTAR LEAD<br><small>Peso OK para a equipa atual, mas há itens grandes.</small>", "status-lead");
            } else {
                showResult("❌ REJEITAR AJUDA<br><small>A equipa atual suporta até "+capacityOfCurrentTeam+"kg. O pedido tem "+weight+"kg.</small>", "status-reject");
            }
        } 
        else {
            // Se o peso EXCEDER a capacidade
            let excessWeight = weight - capacityOfCurrentTeam;
            
            // Verificamos se adicionar +1 moto mantém a eficiência de sacos
            // Regra: Sacos / (Total de pessoas após adição) deve ser >= 2
            if (bags / (currentCouriers + 1) < 2) {
                showResult("❌ REJEITAR AJUDA<br><small>Peso excede, mas o número de sacos não permite mais divisões (Rácio < 2).</small>", "status-reject");
            } else {
                showResult("✅ ADICIONAR +1 MOTO<br><small>Excesso de "+excessWeight.toFixed(1)+"kg detetado.</small>", "status-approve");
            }
        }
    }

    function showResult(text, className) {
        const div = document.getElementById('result');
        div.innerHTML = text;
        div.className = className;
    }
</script>

</body>
</html>
